<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <p id="error"></p>
        <p id="success"></p>
        <h1>Mishbah's To-Do List</h1>

        <div class="todo-input-section" id="todo-input-section">
            <input type="text" id="todoInput" placeholder="Add a new to-do...">
            <button id="addTodoBtn">Add To-Do</button>
        </div>

        <div class="update-section" id="update-section">
            <input type="text" id="updateInput" placeholder="Update your task...">
            <br />
            <button id="updateTodoBtn">Update</button>
            <button id="cancelUpdateBtn">Cancel</button>
        </div>

        <p id="loading">Loading...</p>
        <p id="no-task">No tasks yet. Add your first task!</p>

        <ul id="todoList" class="todo-list">
            
        </ul>
    </div>

    <script src="app.js"></script>
</body>

</html>
