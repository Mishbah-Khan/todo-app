<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button type="button" id="btn-click"> Click For Magic </button>
    <ul id="post-list"></ul>

    <div>
        <h2>Create Post</h2>
        <input type="text" placeholder="Enter Title" id="post-title">
        <input type="text" placeholder="Enter Description" id="post-desc">

        <button type="button" id="create-btn">Create Post</button>
    </div>
    <div>
        <h2>Update Post</h2>
        <input type="text" placeholder="Enter ID" id="post-id">
        <input type="text" placeholder="Enter Title" id="update-title">
        <button type="button" id="update-btn">Update Post</button>
    </div>
    <div>
        <h2>Update Delete</h2>
        <input type="text" placeholder="Enter ID" id="post-delete-id">
        <button type="button" id="delete-btn">Delete Post</button>
    </div>
    

    <script>
        const API_URL = 'https://jsonplaceholder.typicode.com/posts';
        const btnClick = document.getElementById("btn-click");
        const postList = document.getElementById("post-list");
        const postCreateBtn = document.getElementById("create-btn");
        const postUpdateBtn = document.getElementById("update-btn");
        const postDeleteBtn = document.getElementById("delete-btn");

        // Fetch data through API
        const fetchData = () => {
            fetch(`${API_URL}?_limit=5`)
            .then((res) => res.json())
            .then((tasks) => 
                {
                    postList.innerHTML = "";
                    tasks.map((task) => {
                       
                        const li = document.createElement('li');
                        li.innerHTML = `
                        <h5>${task.id} - ${task.title}</h5>
                        `;
                        postList.appendChild(li);
                        console.log(tasks);
                        
                })
            }
            );
        }

        btnClick.addEventListener('click', fetchData);

        // Create data through API
        postCreateBtn.addEventListener('click', () => {
            const title = document.getElementById("post-title").value;
            const body = document.getElementById("post-desc").value;
                const data = {
                    title,
                    body
                }
                fetch(API_URL,{
                    method: 'POST',
                    headers: {'content-type': "application/json"},
                    body: JSON.stringify(data)
                })
                .then((res) => res.json())
                .then((response) => {
                    alert('Post created successfully');
                })
        });


        // Update data through API
        postUpdateBtn.addEventListener('click',() =>{
            const postId = document.getElementById('post-id').value;
            const updateTitle = document.getElementById('update-title').value;
            const data = {
                    title: updateTitle,
                    userId: 1
                }
            fetch(`${API_URL}/${postId}`, {
                method: 'PUT',
                headers: {'content-type': "application/json"},
                body: JSON.stringify(data)
            })
            .then((res) => res.json())
                .then((response) => {
                    alert('Post updated successfully');
                    console.log(response);
                })

        });

        // Delete data
        postDeleteBtn.addEventListener('click',() =>{
            const postId = document.getElementById('post-id').value;
            const updateTitle = document.getElementById('update-title').value;
            
            fetch(`${API_URL}/${postId}`, {
                method: 'DELETE',
            })
            .then((res) => res.json())
                .then((response) => {
                    alert('Post  successfully');
                    console.log(response);
                })

        });



    </script>

</body>
</html>
